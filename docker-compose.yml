# 로컬 개발용 인프라. 실행: docker compose up -d
services:
  postgres:
    image: postgres:15-alpine          # 4단계 설계 기준 PostgreSQL 15
    container_name: meeplenote-postgres
    environment:
      POSTGRES_DB: meeplenote
      POSTGRES_USER: meeplenote
      POSTGRES_PASSWORD: meeplenote
    ports:
      - "5432:5432"
    volumes:
      - meeplenote-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meeplenote -d meeplenote"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  meeplenote-pgdata:
